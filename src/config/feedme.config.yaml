# FeedMe user-facing configuration.
# Category display order follows the order below.

settings:
  defaultSource: hacker-news-best
  maxItemsPerFeed: 30
  dataPath: ./public/data

summary:
  contentMaxChars: 5000
  temperature: 0.3
  maxTokens: 500
  unavailableMessages:
    zh: 无法生成摘要。
    en: Unable to generate summary.
  prompt: |
    You are a professional content summarizer. Generate a concise and accurate summary in {{summaryLanguage}}.
    The summary should:
    1. Capture the main points and key information.
    2. Be clear, fluent, and natural in {{summaryLanguage}}.
    3. Stay around 100 words or fewer.
    4. Remain objective and avoid adding opinions.
    5. If the content is empty or lacks useful information, do not invent details.
    6. If the source title or content is in another language, summarize the key information in {{summaryLanguage}}.

    Article title:
    {{title}}

    Article content:
    {{content}}

categories:
  - id: techNews
    name:
      zh: 科技资讯
      en: Tech News
  - id: personalBlogs
    name:
      zh: 个人博客
      en: Personal Blogs
  - id: bilibili
    name:
      zh: B站
      en: Bilibili

sources:
  - id: hacker-news-best
    name:
      zh: Hacker News 近期最佳
      en: Hacker News Best
    url: https://hnrss.org/best
    category: techNews
  - id: hacker-news-daily-top-10
    name:
      zh: Hacker News 历史每日前十
      en: Hacker News Daily Top 10
    url: https://rsshub.rssforever.com/github/issue/headllines/hackernews-daily
    category: techNews
  - id: ruanyifeng
    name:
      zh: 阮一峰的个人网站
      en: Ruanyifeng's Blog
    url: http://www.ruanyifeng.com/blog/atom.xml
    category: personalBlogs
  - id: hezhong-bilibili-dynamic
    name:
      zh: 合众教育Bilibili动态
      en: HeZhong Bilibili Dynamic
    url: https://rss.spriple.org/bilibili/user/dynamic/417302260
    category: bilibili
